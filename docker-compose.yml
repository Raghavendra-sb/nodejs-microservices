version: "3.9"

services:

  mongodb:
    image: mongo:5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    ports:
      - "3000:3000"
    depends_on:
      - mongodb

  task-service:
    build: ./task-service
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - rabbitmq

  notification-service:
    build: ./notification-service
    depends_on:
      - rabbitmq
      - mongodb

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    depends_on:
      - user-service
      - task-service

   

volumes:
  mongo_data: