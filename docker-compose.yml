version: "3.9"

services:

  mongodb:
    image: mongo:5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db #what is the significance of volume here?It is used to persist data 
      #generated by the MongoDB container. By using a named volume (mongo_data), the data will be stored outside of the container's filesystem, allowing it to persist even if the container is stopped or removed. This ensures that your MongoDB data is not lost when you update or restart your services.
    

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    ports:
      - "3000:3000"
    volumes:
      - ./user-service:/app #WHY Volume here?9t is used to mount the local directory of the user-service into the container. This allows for live code changes without needing to rebuild the Docker image. When you make changes to the code in the user-service directory on your host machine, those changes will be reflected inside the container immediately, facilitating development and testing.
      - /app/node_modules
    depends_on:
      - mongodb

  task-service:
    build: ./task-service
    ports:
      - "8080:8080"
    volumes:
      - ./task-service:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - rabbitmq

  notification-service:
    build: ./notification-service
    volumes:
      - ./notification-service:/app
      - /app/node_modules
    depends_on:
      - rabbitmq
      - mongodb

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    depends_on:
      - user-service
      - task-service

volumes:
  mongo_data: